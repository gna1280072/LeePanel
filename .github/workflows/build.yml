name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: taichi-panel-windows
    runs-on: ${{ matrix.platform }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TaiChi Panel ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  generate-updater-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get release assets info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          # Find the NSIS installer asset URL and signature
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          echo "Assets: $ASSETS"

          # Get NSIS exe URL
          EXE_NAME=$(echo "$ASSETS" | grep '\.exe$' | head -1)
          EXE_URL="https://github.com/$REPO/releases/download/$TAG/$EXE_NAME"

          # Get MSI URL
          MSI_NAME=$(echo "$ASSETS" | grep '\.msi$' | head -1)
          MSI_URL="https://github.com/$REPO/releases/download/$TAG/$MSI_NAME"

          # Get signature files
          SIG_NAME=$(echo "$ASSETS" | grep '\.exe\.sig$' | head -1)
          if [ -n "$SIG_NAME" ]; then
            gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir ./sigs
            SIG_CONTENT=$(cat ./sigs/$SIG_NAME)
          else
            SIG_CONTENT=""
          fi

          # Generate update.json
          cat > update.json << EOF
          {
            "version": "$VERSION",
            "notes": "TaiChi Panel $TAG",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIG_CONTENT",
                "url": "$EXE_URL"
              }
            }
          }
          EOF

          cat update.json
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy update.json to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
          destination_dir: .
          # Only deploy the update.json file
          force_copy: false
        if: startsWith(github.ref, 'refs/tags/v')
