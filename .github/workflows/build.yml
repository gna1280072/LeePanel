name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: leepanel-windows
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: leepanel-macos-intel
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: leepanel-macos-arm
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: leepanel-linux
    runs-on: ${{ matrix.platform }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: 'true'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LeePanel ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/archive/*.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/archive/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  generate-updater-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get release assets info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          echo "Assets: $ASSETS"

          # Windows
          EXE_NAME=$(echo "$ASSETS" | grep -E '\.exe$' | grep -v '\.sig' | head -1)
          EXE_URL="https://github.com/$REPO/releases/download/$TAG/$EXE_NAME"
          EXE_SIG_NAME=$(echo "$ASSETS" | grep -E '\.exe\.sig$' | head -1)

          # macOS Intel
          DMG_INTEL_NAME=$(echo "$ASSETS" | grep -E 'x64.*\.app\.tar\.gz$' | grep -v '\.sig' | head -1)
          DMG_INTEL_URL="https://github.com/$REPO/releases/download/$TAG/$DMG_INTEL_NAME"
          DMG_INTEL_SIG_NAME=$(echo "$ASSETS" | grep -E 'x64.*\.app\.tar\.gz\.sig$' | head -1)

          # macOS ARM
          DMG_ARM_NAME=$(echo "$ASSETS" | grep -E 'aarch64.*\.app\.tar\.gz$' | grep -v '\.sig' | head -1)
          DMG_ARM_URL="https://github.com/$REPO/releases/download/$TAG/$DMG_ARM_NAME"
          DMG_ARM_SIG_NAME=$(echo "$ASSETS" | grep -E 'aarch64.*\.app\.tar\.gz\.sig$' | head -1)

          # Linux
          DEB_NAME=$(echo "$ASSETS" | grep -E '\.deb$' | grep -v '\.sig' | head -1)
          DEB_URL="https://github.com/$REPO/releases/download/$TAG/$DEB_NAME"
          DEB_SIG_NAME=$(echo "$ASSETS" | grep -E '\.deb\.sig$' | head -1)

          # Download signatures
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir ./sigs 2>/dev/null || true

          get_sig() {
            local name="$1"
            if [ -n "$name" ] && [ -f "./sigs/$name" ]; then
              cat "./sigs/$name"
            else
              echo ""
            fi
          }

          EXE_SIG=$(get_sig "$EXE_SIG_NAME")
          DMG_INTEL_SIG=$(get_sig "$DMG_INTEL_SIG_NAME")
          DMG_ARM_SIG=$(get_sig "$DMG_ARM_SIG_NAME")
          DEB_SIG=$(get_sig "$DEB_SIG_NAME")

          # Generate update.json
          cat > update.json << EOF
          {
            "version": "$VERSION",
            "notes": "LeePanel $TAG",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$EXE_SIG",
                "url": "$EXE_URL"
              },
              "darwin-x86_64": {
                "signature": "$DMG_INTEL_SIG",
                "url": "$DMG_INTEL_URL"
              },
              "darwin-aarch64": {
                "signature": "$DMG_ARM_SIG",
                "url": "$DMG_ARM_URL"
              },
              "linux-x86_64": {
                "signature": "$DEB_SIG",
                "url": "$DEB_URL"
              }
            }
          }
          EOF

          cat update.json
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Deploy update.json to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
          destination_dir: .
          force_copy: false
        if: startsWith(github.ref, 'refs/tags/v')
