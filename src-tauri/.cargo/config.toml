# ponytail: build speed tuning
# To enable lld fast linker: winget install LLVM.LLVM, then uncomment below
# [target.x86_64-pc-windows-msvc]
# linker = "lld-link"
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# ponytail: max parallel codegen + skip debug info in dev = noticeably faster builds
[profile.dev]
codegen-units = 256
debug = 0
